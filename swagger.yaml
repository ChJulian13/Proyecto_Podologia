      tags:
        - Usuarios
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID del usuario al que se le cambiará la contraseña
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '200':
          description: Contraseña actualizada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Contraseña actualizada correctamente"
        '400':
          description: Error de validación (Zod) o formato de ID inválido.
        '401':
          description: No autorizado. La contraseña actual enviada no coincide con el hash almacenado.
        '404':
          description: Usuario no encontrado en la base de datos.
        '500':
          description: Error interno al actualizar la contraseña.
          
