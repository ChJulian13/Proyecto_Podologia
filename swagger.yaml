openapi: 3.0.0
info:
  title: API ICS Quiropodia
  version: 1.0.0
  description: Documentación oficial de los endpoints de la clínica podológica.
servers:
  - url: http://localhost:3000
    description: Servidor Local

# ==========================================
# 1. COMPONENTES Y ESQUEMAS (Modelos)
# ==========================================
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      
  schemas:
    # --- AGENDA RÁPIDA ---
    PacienteRapidoDTO:
      type: object
      required:
        - nombre
        - primer_apellido
        - telefono
      properties:
        nombre:
          type: string
          example: "Juan"
        primer_apellido:
          type: string
          example: "Pérez"
        telefono:
          type: string
          example: "2281234567"

    CreateCitaRapidaDTO:
      type: object
      required:
        - clinica_id
        - podologo_id
        - fecha_programada
        - hora_programada
        - paciente_nuevo
      properties:
        clinica_id:
          type: string
          format: uuid
        podologo_id:
          type: string
          format: uuid
        servicio_id:
          type: string
          format: uuid
          nullable: true
        fecha_programada:
          type: string
          format: date
          example: "2026-05-15"
        hora_programada:
          type: string
          example: "10:30"
        duracion_minutos:
          type: integer
          default: 60
        notas:
          type: string
          nullable: true
        paciente_nuevo:
          $ref: '#/components/schemas/PacienteRapidoDTO'

    # --- CATEGORÍAS INVENTARIO ---
    CategoriaInventarioEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          example: "Consumible Médico"
        descripcion:
          type: string
          nullable: true
        estaActivo:
          type: boolean
        fechaCreacion:
          type: string
          format: date-time

    CreateCategoriaInventarioDTO:
      type: object
      required:
        - nombre
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 50
          example: "Insumos"
        descripcion:
          type: string
          maxLength: 255
          nullable: true

    UpdateCategoriaInventarioDTO:
      type: object
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 50
        descripcion:
          type: string
          maxLength: 255
          nullable: true
          
    PacienteRapidoDTO:
      type: object
      required:
        - nombre
        - primer_apellido
        - telefono
      properties:
        nombre:
          type: string
        primer_apellido:
          type: string
        telefono:
          type: string

    CreateCitaRapidaDTO:
      type: object
      required:
        - clinica_id
        - podologo_id
        - fecha_programada
        - hora_programada
        - paciente_nuevo
      properties:
        clinica_id:
          type: string
          format: uuid
        podologo_id:
          type: string
          format: uuid
        servicio_id:
          type: string
          format: uuid
          nullable: true
        fecha_programada:
          type: string
          format: date
        hora_programada:
          type: string
          example: "16:30"
        duracion_minutos:
          type: integer
          default: 60
        notas:
          type: string
          nullable: true
        paciente_nuevo:
          $ref: '#/components/schemas/PacienteRapidoDTO'

    # --- INVENTARIO ---
    InventarioEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        categoria:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        nombre:
          type: string
          example: "Crema de Urea 40%"
        descripcion:
          type: string
          nullable: true
        precioCompra:
          type: number
          format: float
          nullable: true
          description: "Solo visible para roles ADMINISTRADOR y CONTADOR"
          example: 120.50
        precioVenta:
          type: number
          format: float
          nullable: true
          example: 250.00
        requiereLote:
          type: boolean
          description: "Indica si este producto requiere control por número de lote"
        requiereCaducidad:
          type: boolean
          description: "Indica si este producto requiere control de fecha de caducidad"
        ubicacion:
          type: string
          nullable: true
          example: "Vitrina 1"
        estaActivo:
          type: boolean
        stockTotal:
          type: integer
          description: "Stock total calculado como SUM de todos los lotes activos"
          example: 50
        fechaCreacion:
          type: string
          format: date-time
        fechaActualizacion:
          type: string
          format: date-time

    CreateInventarioDTO:
      type: object
      required:
        - clinica_id
        - categoria_id
        - nombre
      properties:
        clinica_id:
          type: string
          format: uuid
        categoria_id:
          type: string
          format: uuid
        nombre:
          type: string
          minLength: 2
        descripcion:
          type: string
          nullable: true
        precio_compra:
          type: number
          format: float
          minimum: 0
          nullable: true
        precio_venta:
          type: number
          format: float
          minimum: 0
          nullable: true
        requiere_lote:
          type: boolean
          default: false
        requiere_caducidad:
          type: boolean
          default: false
        ubicacion:
          type: string
          maxLength: 255
          nullable: true

    UpdateInventarioDTO:
      type: object
      properties:
        categoria_id:
          type: string
          format: uuid
        nombre:
          type: string
          minLength: 2
        descripcion:
          type: string
          nullable: true
        precio_compra:
          type: number
          format: float
          minimum: 0
          nullable: true
        precio_venta:
          type: number
          format: float
          minimum: 0
          nullable: true
        requiere_lote:
          type: boolean
        requiere_caducidad:
          type: boolean
        ubicacion:
          type: string
          maxLength: 255
          nullable: true

    # --- INVENTARIO LOTES ---
    InventarioLoteEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        inventarioId:
          type: string
          format: uuid
        numeroLote:
          type: string
          example: "LOTE-2026-A01"
        fechaCaducidad:
          type: string
          format: date
          nullable: true
          example: "2027-03-15"
        stockCantidad:
          type: integer
          example: 25
        fechaIngreso:
          type: string
          format: date-time

    CreateLoteDTO:
      type: object
      required:
        - numero_lote
        - stock_cantidad
      properties:
        numero_lote:
          type: string
          minLength: 1
          maxLength: 50
          example: "LOTE-2026-A01"
        fecha_caducidad:
          type: string
          format: date
          nullable: true
          example: "2027-03-15"
        stock_cantidad:
          type: integer
          minimum: 1
          example: 50

    # --- INVENTARIO CÓDIGOS DE BARRAS ---
    InventarioCodigoBarrasEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        inventarioId:
          type: string
          format: uuid
        codigoBarra:
          type: string
          example: "7501234567890"
        fechaCreacion:
          type: string
          format: date-time

    CreateCodigoBarrasDTO:
      type: object
      required:
        - codigo_barra
      properties:
        codigo_barra:
          type: string
          minLength: 1
          maxLength: 100
          example: "7501234567890"

    # --- VENTAS INVENTARIO ---
    VentaInventarioEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        pacienteId:
          type: string
          format: uuid
          nullable: true
        facturaId:
          type: string
          format: uuid
          nullable: true
        inventarioItem:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        cantidad:
          type: integer
        precioVenta:
          type: number
          format: float
        fechaVenta:
          type: string
          format: date-time
        estaCancelada:
          type: boolean

    ItemVentaDTO:
      type: object
      required:
        - inventario_item_id
        - cantidad
        - precio_venta
      properties:
        inventario_item_id:
          type: string
          format: uuid
        cantidad:
          type: integer
          minimum: 1
        precio_venta:
          type: number
          format: float
          minimum: 0

    CreateVentaMasivaDTO:
      type: object
      required:
        - clinica_id
        - productos
      properties:
        clinica_id:
          type: string
          format: uuid
        paciente_id:
          type: string
          format: uuid
          nullable: true
        factura_id:
          type: string
          format: uuid
          nullable: true
        productos:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ItemVentaDTO'
    AnamnesisEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        pacienteId:
          type: string
          format: uuid
        paciente:
          type: object
          properties:
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
            telefono:
              type: string
            correo:
              type: string
              nullable: true
            fechaNacimiento:
              type: string
              format: date
              nullable: true
            notas:
              type: string
              nullable: true
            direccion:
              type: object
              properties:
                codigoPostal:
                  type: string
                  nullable: true
                estado:
                  type: string
                  nullable: true
                municipio:
                  type: string
                  nullable: true
                ciudad:
                  type: string
                  nullable: true
                colonia:
                  type: string
                  nullable: true
                calleYNumero:
                  type: string
                  nullable: true
        podologoVerificadorId:
          type: string
          format: uuid
          nullable: true
        fechaVerificacion:
          type: string
          format: date-time
          nullable: true
        profesion:
          type: string
          nullable: true
        contactoEmergenciaNombre:
          type: string
          nullable: true
        contactoEmergenciaTelefono:
          type: string
          nullable: true
        comoNosEncontro:
          type: string
          enum: [EVENTO, INSTAGRAM, INTERNET, RECOMENDACION, OTRO]
          nullable: true
        tomaMedicamentos:
          type: boolean
        listaMedicamentos:
          type: string
          nullable: true
        estaEmbarazada:
          type: boolean
        semanaEmbarazo:
          type: integer
          nullable: true
        embarazoAltoRiesgo:
          type: boolean
        embarazoDetalles:
          type: string
          nullable: true
        tuvoCirugiasLesiones:
          type: boolean
        listaCirugiasLesiones:
          type: string
          nullable: true
        haRecibidoReflexologia:
          type: boolean
        motivoConsulta:
          type: string
          nullable: true
        objetivosSesion:
          type: string
          nullable: true
        condicionCancer:
          type: boolean
        condicionDolorCabeza:
          type: boolean
        condicionArtritis:
          type: boolean
        condicionDiabetes:
          type: boolean
        condicionPresionAlterada:
          type: boolean
        condicionNeuropatia:
          type: boolean
        condicionFibromialgia:
          type: boolean
        condicionInfarto:
          type: boolean
        condicionEnfermedadRenal:
          type: boolean
        condicionTrombosis:
          type: boolean
        condicionEntumecimiento:
          type: boolean
        condicionEsguinces:
          type: boolean
        condicionExplicacion:
          type: string
          nullable: true
        mapaCorporalUrl:
          type: string
          nullable: true
        escalaSueno:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escalaEnergia:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escalaEstres:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escalaNutricion:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escalaEjercicio:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        aceptaTerminos:
          type: boolean
        lugarFirma:
          type: string
          nullable: true
        fechaCreacion:
          type: string
          format: date-time
        fechaActualizacion:
          type: string
          format: date-time
        alergias:
          type: string
          nullable: true
        discapacidad:
          type: string
          nullable: true

    CreateAnamnesisDTO:
      type: object
      required:
        - clinica_id
        - paciente_id
      properties:
        clinica_id:
          type: string
          format: uuid
        paciente_id:
          type: string
          format: uuid
        correo:
          type: string
          format: email
          nullable: true
        fecha_nacimiento:
          type: string
          format: date
          nullable: true
        codigoPostal:
          type: string
          pattern: '^\d{5}$'
          nullable: true
        estado:
          type: string
          nullable: true
        municipio:
          type: string
          nullable: true
        ciudad:
          type: string
          nullable: true
        colonia:
          type: string
          nullable: true
        calleYNumero:
          type: string
          nullable: true
        profesion:
          type: string
          maxLength: 150
          nullable: true
        alergias:
          type: string
          nullable: true
        discapacidad:
          type: string
          nullable: true
        contacto_emergencia_nombre:
          type: string
          maxLength: 150
          nullable: true
        contacto_emergencia_telefono:
          type: string
          maxLength: 20
          nullable: true
        como_nos_encontro:
          type: string
          enum: [EVENTO, INSTAGRAM, INTERNET, RECOMENDACION, OTRO]
          nullable: true
        toma_medicamentos:
          type: boolean
          default: false
        lista_medicamentos:
          type: string
          nullable: true
        esta_embarazada:
          type: boolean
          default: false
        semana_embarazo:
          type: integer
          minimum: 1
          maximum: 42
          nullable: true
        embarazo_alto_riesgo:
          type: boolean
          default: false
        embarazo_detalles:
          type: string
          nullable: true
        tuvo_cirugias_lesiones:
          type: boolean
          default: false
        lista_cirugias_lesiones:
          type: string
          nullable: true
        ha_recibido_reflexologia:
          type: boolean
          default: false
        motivo_consulta:
          type: string
          nullable: true
        objetivos_sesion:
          type: string
          nullable: true
        condicion_cancer:
          type: boolean
          default: false
        condicion_dolor_cabeza:
          type: boolean
          default: false
        condicion_artritis:
          type: boolean
          default: false
        condicion_diabetes:
          type: boolean
          default: false
        condicion_presion_alterada:
          type: boolean
          default: false
        condicion_neuropatia:
          type: boolean
          default: false
        condicion_fibromialgia:
          type: boolean
          default: false
        condicion_infarto:
          type: boolean
          default: false
        condicion_enfermedad_renal:
          type: boolean
          default: false
        condicion_trombosis:
          type: boolean
          default: false
        condicion_entumecimiento:
          type: boolean
          default: false
        condicion_esguinces:
          type: boolean
          default: false
        condicion_explicacion:
          type: string
          nullable: true
        mapa_corporal_url:
          type: string
          maxLength: 255
          nullable: true
        escala_sueno:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_energia:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_estres:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_nutricion:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_ejercicio:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        acepta_terminos:
          type: boolean
          default: false
        lugar_firma:
          type: string
          maxLength: 150
          nullable: true

    UpdateAnamnesisDTO:
      type: object
      description: Copia parcial de CreateAnamnesisDTO, omitiendo clinica_id y paciente_id.
      properties:
        correo:
          type: string
          format: email
          nullable: true
        fecha_nacimiento:
          type: string
          format: date
          nullable: true
        codigoPostal:
          type: string
          pattern: '^\d{5}$'
          nullable: true
        estado:
          type: string
          nullable: true
        municipio:
          type: string
          nullable: true
        ciudad:
          type: string
          nullable: true
        colonia:
          type: string
          nullable: true
        calleYNumero:
          type: string
          nullable: true
        profesion:
          type: string
          maxLength: 150
          nullable: true
        alergias:
          type: string
          nullable: true
        discapacidad:
          type: string
          nullable: true
        contacto_emergencia_nombre:
          type: string
          maxLength: 150
          nullable: true
        contacto_emergencia_telefono:
          type: string
          maxLength: 20
          nullable: true
        como_nos_encontro:
          type: string
          enum: [EVENTO, INSTAGRAM, INTERNET, RECOMENDACION, OTRO]
          nullable: true
        toma_medicamentos:
          type: boolean
        lista_medicamentos:
          type: string
          nullable: true
        esta_embarazada:
          type: boolean
        semana_embarazo:
          type: integer
          minimum: 1
          maximum: 42
          nullable: true
        embarazo_alto_riesgo:
          type: boolean
        embarazo_detalles:
          type: string
          nullable: true
        tuvo_cirugias_lesiones:
          type: boolean
        lista_cirugias_lesiones:
          type: string
          nullable: true
        ha_recibido_reflexologia:
          type: boolean
        motivo_consulta:
          type: string
          nullable: true
        objetivos_sesion:
          type: string
          nullable: true
        condicion_cancer:
          type: boolean
        condicion_dolor_cabeza:
          type: boolean
        condicion_artritis:
          type: boolean
        condicion_diabetes:
          type: boolean
        condicion_presion_alterada:
          type: boolean
        condicion_neuropatia:
          type: boolean
        condicion_fibromialgia:
          type: boolean
        condicion_infarto:
          type: boolean
        condicion_enfermedad_renal:
          type: boolean
        condicion_trombosis:
          type: boolean
        condicion_entumecimiento:
          type: boolean
        condicion_esguinces:
          type: boolean
        condicion_explicacion:
          type: string
          nullable: true
        mapa_corporal_url:
          type: string
          maxLength: 255
          nullable: true
        escala_sueno:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_energia:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_estres:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_nutricion:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_ejercicio:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        acepta_terminos:
          type: boolean
        lugar_firma:
          type: string
          maxLength: 150
          nullable: true

    # --- CONSULTAS (Acto Médico) ---
    ConsultaRecetaEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        consultaId:
          type: string
          format: uuid
        productoId:
          type: string
          format: uuid
        productoNombre:
          type: string
          nullable: true
          example: "Crema de Urea 40%"
        cantidad:
          type: integer
          minimum: 1
          example: 2
        precioUnitarioVenta:
          type: number
          format: float
          nullable: true
          example: 185.00
        indicacionesUso:
          type: string
          nullable: true
          example: "Aplicar dos veces al día después del baño"

    ConsultaEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        citaId:
          type: string
          format: uuid
        pacienteId:
          type: string
          format: uuid
        podologoId:
          type: string
          format: uuid
        servicioId:
          type: string
          format: uuid
          nullable: true
        diagnostico:
          type: string
          nullable: true
          example: "Onicomicosis leve en primer ortejo derecho"
        procedimientoDetallado:
          type: string
          nullable: true
          example: "Limado de uña, aplicación de antimicótico tópico"
        indicacionesCuidado:
          type: string
          nullable: true
          example: "Mantener pie seco, cambio de medias diario"
        fechaProximaConsulta:
          type: string
          format: date
          nullable: true
          example: "2026-06-10"
        montoProcedimiento:
          type: number
          format: float
          nullable: true
          example: 450.00
        fechaRegistro:
          type: string
          format: date-time
        recetas:
          type: array
          items:
            $ref: '#/components/schemas/ConsultaRecetaEntity'

    CreateConsultaRecetaDTO:
      type: object
      required:
        - producto_id
        - cantidad
        - precio_unitario_venta
      properties:
        producto_id:
          type: string
          format: uuid
        cantidad:
          type: integer
          minimum: 1
          example: 1
        precio_unitario_venta:
          type: number
          format: float
          minimum: 0.01
          example: 185.00
        indicaciones_uso:
          type: string
          maxLength: 500
          nullable: true
          example: "Aplicar en la zona afectada dos veces al día"

    CreateConsultaDTO:
      type: object
      required:
        - clinica_id
        - cita_id
        - paciente_id
        - podologo_id
      properties:
        clinica_id:
          type: string
          format: uuid
        cita_id:
          type: string
          format: uuid
        paciente_id:
          type: string
          format: uuid
        podologo_id:
          type: string
          format: uuid
        servicio_id:
          type: string
          format: uuid
          nullable: true
        diagnostico:
          type: string
          maxLength: 2000
          nullable: true
          example: "Onicomicosis leve en primer ortejo derecho"
        procedimiento_detallado:
          type: string
          maxLength: 2000
          nullable: true
          example: "Limado de uña, aplicación de antimicótico tópico"
        indicaciones_cuidado:
          type: string
          maxLength: 2000
          nullable: true
          example: "Mantener pie seco, cambio de medias diario"
        fecha_proxima_consulta:
          type: string
          format: date
          nullable: true
          example: "2026-06-10"
