            - nombre
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        correo:
          type: string
          format: email
        nombre:
          type: string
        primerApellido:
          type: string
        segundoApellido:
          type: string
          nullable: true
        nombreCompleto:
          type: string
