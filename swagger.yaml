    # --- ESQUEMAS DE OPERACIÓN DIARIA ---
    ResumenHoyEntity:
      type: object
      properties:
        totalCitas:
          type: integer
          example: 12
        completadas:
          type: integer
          example: 5
        canceladas:
          type: integer
          example: 1
        ingresosEsperados:
          type: number
          format: float
          example: 2500.50

    CitaProximaEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fechaProgramada:
          type: string
          format: date
          example: "2026-04-14"
        horaProgramada:
          type: string
          example: "14:30:00"
        estado:
          type: string
          example: "PROGRAMADA"
        nombrePaciente:
          type: string
          example: "Guadalupe Jimenez Trigos"
        nombrePodologo:
          type: string
          example: "Juan Sanchez"
        nombreServicio:
          type: string
          example: "Análisis de la Pisada"

    AlertaNotaEntity:
      type: object
      properties:
        citaId:
          type: string
          format: uuid
        fechaProgramada:
          type: string
          format: date
          example: "2026-04-14"
        nombrePaciente:
          type: string
          example: "Paola Gonzalez Taramara"
    
    UpdatePasswordRequest:
      type: object
      required:
        - contrasenaActual
        - nuevaContrasena
      properties:
        contrasenaActual:
          type: string
          example: "MiPasswordViejo123"
          description: "La contraseña actual del usuario para autorizar el cambio."
        nuevaContrasena:
          type: string
          format: password
          minLength: 6
          example: "MiNuevoPassword456"
          description: "La nueva contraseña (mínimo 6 caracteres)."

    DireccionInfoEntity:
      type: object
      properties:
        codigoPostal:
          type: string
          example: "91018"
        estado:
          type: string
          example: "Veracruz de Ignacio de la Llave"
        municipio:
          type: string
          example: "Xalapa"
        ciudad:
          type: string
          nullable: true
          example: "Xalapa-Enríquez"
        colonias:
          type: array
          items:
            type: string
          example: ["Centro", "Veracruz", "Manantiales"]


# ==========================================
# 2. RUTAS (Endpoints)
# ==========================================
paths:
  # --- ANAMNESIS ---
  /api/anamnesis/paciente/{pacienteId}:
    get:
      summary: Obtiene la anamnesis y los datos combinados de un paciente
      description: Retorna el historial médico completo (AnamnesisEntity) fusionado con los datos demográficos del paciente.
      tags:
        - Anamnesis
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: pacienteId
          required: true
          description: UUID del paciente
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Anamnesis obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/AnamnesisEntity'
        '404':
          description: Paciente o Anamnesis no encontrada

  /api/anamnesis:
    post:
      summary: Crea una nueva anamnesis (Paso 2 del registro)
      description: Endpoint híbrido transaccional. Actualiza la tabla pacientes e inserta el historial clínico en la tabla anamnesis_paciente.
      tags:
        - Anamnesis
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnamnesisDTO'
      responses:
        '201':
          description: Anamnesis registrada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Anamnesis registrada exitosamente"
                  data:
                    $ref: '#/components/schemas/AnamnesisEntity'
        '400':
          description: Error de validación (Zod)
        '409':
          description: El paciente ya tiene una anamnesis registrada

  /api/anamnesis/{id}:
    patch:
      summary: Actualiza parcialmente la anamnesis o los datos del paciente
      description: Recibe un payload parcial para actualizar dinámicamente cualquier campo médico o demográfico mediante una transacción SQL.
      tags:
        - Anamnesis
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: UUID de la anamnesis (No del paciente)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAnamnesisDTO'
      responses:
        '200':
          description: Anamnesis actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Anamnesis actualizada"
                  data:
                    $ref: '#/components/schemas/AnamnesisEntity'
        '404':
          description: Anamnesis no encontrada

  # --- AUTENTICACIÓN ---
  /api/auth/login:
    post:
      summary: Iniciar sesión en el sistema
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - correo
                - contrasena
              properties:
                correo:
                  type: string
                  format: email
                  example: "juan.recepcion@icsquiropodia.com"
                contrasena:
                  type: string
                  example: "Segura123!"
      responses:
        '200':
          description: Inicio de sesión exitoso. Se inyecta la cookie HttpOnly de forma transparente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Inicio de sesión exitoso"
                  data:
                    $ref: '#/components/schemas/UsuarioEntity'
        '400':
          description: Error de validación Zod.
        '401':
          description: CREDENCIALES_INVALIDAS - Correo o contraseña incorrectos.
        '500':
          description: Error interno en el inicio de sesión.

  /api/auth/logout:
    post:
      summary: Cerrar sesión
      tags:
        - Autenticación
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Sesión cerrada exitosamente. Se instruye al navegador a destruir la cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Sesión cerrada exitosamente"

  # --- CITAS ---
  /api/citas/clinica/{clinicaId}:
    get:
      summary: Obtener todas las citas de una clínica específica
      tags:
        - Citas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: clinicaId
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la clínica
      responses:
        '200':
          description: Lista de entidades Cita mapeadas para Angular.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CitaEntity'
        '400':
          description: El ID de la clínica es inválido.

  /api/citas:
    post:
      summary: Agendar una nueva cita
      tags:
        - Citas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clinica_id
                - paciente_id
                - podologo_id
                - fecha_programada
                - hora_programada
              properties:
                clinica_id:
                  type: string
                  format: uuid
                paciente_id:
                  type: string
                  format: uuid
                podologo_id:
                  type: string
                  format: uuid
                servicio_id:
                  type: string
                  format: uuid
                  nullable: true
                fecha_programada:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                  example: "2026-04-15"
                hora_programada:
                  type: string
                  pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
                  example: "09:30"
                duracion_minutos:
                  type: integer
                  minimum: 1
                  default: 60
                notas:
                  type: string
      responses:
        '201':
          description: Cita agendada exitosamente.
        '400':
          description: Error de validación Zod.
  
  /api/citas/rapida:
    post:
      summary: Agendar Cita Rápida (Paciente Nuevo)
      description: Crea un registro de paciente exprés y agenda su cita en una sola transacción.
      tags:
        - Citas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCitaRapidaDTO'
      responses:
        '201':
          description: Cita y paciente creados exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      pacienteId:
                        type: string
                        format: uuid
                      citaId:
                        type: string
                        format: uuid

  /api/citas/hoy:
    get:
      summary: Obtener las citas programadas para el día de hoy
      description: |
        Retorna las citas correspondientes al día actual. 
        El comportamiento es "inteligente" y dinámico según el rol del usuario autenticado en el token:
        - Si el usuario es **PODOLOGO**: Retorna únicamente las citas asignadas a él en su clínica.
        - Si el usuario es **RECEPCIONISTA** o **SUPER_ADMIN**: Retorna todas las citas de la clínica.
      tags:
        - Citas
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Citas del día obtenidas correctamente o lista vacía si no hay citas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Citas del día obtenidas"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CitaEntity'
        '403':
          description: Acceso denegado o clínica no identificada en el token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Acceso denegado o clínica no identificada"
        '500':
          description: Error interno al obtener las citas del día.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Error interno al obtener las citas del día"

  /api/citas/{id}:
    patch:
      summary: Actualizar o cambiar estado de una cita
      tags:
        - Citas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fecha_programada:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                hora_programada:
                  type: string
                  pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
                estado:
                  type: string
                  enum: [PROGRAMADA, CONFIRMADA, COMPLETADA, CANCELADA]
                notas:
                  type: string
      responses:
        '200':
          description: Cita actualizada correctamente.
        '404':
          description: CITA_NOT_FOUND - La cita no existe.
    delete:
      summary: Cancelar una cita (Soft Delete)
      description: Cambia el estado de la cita a 'CANCELADA' sin eliminar el registro físico de la base de datos.
      tags:
        - Citas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la cita a cancelar
      responses:
        '200':
          description: Cita cancelada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Cita cancelada exitosamente"
        '401':
          description: No autorizado - Falta o token inválido.
        '404':
          description: CITA_NOT_FOUND - La cita no existe.
        '500':
          description: Error al cancelar la cita.
  # --- CLÍNICAS ---
  /api/clinicas:
    get:
      summary: Obtener todas las clínicas (Activas e Inactivas)
      tags:
        - Clínicas
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de clínicas obtenida correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClinicaEntity'
        '500':
          description: Error interno del servidor.

    post:
      summary: Crear una nueva clínica (SaaS)
      tags:
        - Clínicas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - planSuscripcionId
              properties:
                nombre:
                  type: string
                  minLength: 3
                  example: "ICS Quiropodia Xalapa Centro"
                telefono:
                  type: string
                  pattern: '^\+?[\d\s\-]{7,20}$'
                  example: "+52 228 123 4567"
                correo:
                  type: string
                  format: email
                  example: "contacto@icsquiropodia.com"
                platformAdminId:
                  type: string
                  format: uuid
                  example: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"
                planSuscripcionId:
                  type: string
                  format: uuid
                  example: "f9e8d7c6-b5a4-3c2d-1e0f-a1b2c3d4e5f6"
                fechaVencimientoSuscripcion:
                  type: string
                  format: date
                  example: "2026-05-20"
                dominioPersonalizado:
                  type: string
                  pattern: '^[a-z0-9-]+$'
                  example: "xalapa-centro"
                configuracionVisual:
                  type: object
                  additionalProperties: true
                  example: { "logo_url": "https://link.com/logo.png", "color_primario": "#FF5733" }
                codigoPostal:
                  type: string
                  pattern: '^\d{5}$'
                  example: "91018"
                estado:
                  type: string
                  example: "Veracruz de Ignacio de la Llave"
                municipio:
                  type: string
                  example: "Xalapa"
                ciudad:
                  type: string
                  example: "Xalapa-Enríquez"
                colonia:
                  type: string
                  example: "Centro"
                calleYNumero:
                  type: string
                  example: "Av. Principal 123"
      responses:
        '201':
          description: Clínica creada exitosamente.
        '400':
          description: Error de validación Zod.
        '500':
          description: Error al crear la clínica.

  /api/clinicas/{id}:
    patch:
      summary: Actualizar datos de un contrato/clínica
      tags:
        - Clínicas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  minLength: 3
                telefono:
                  type: string
                  pattern: '^\+?[\d\s\-]{7,20}$'
                correo:
                  type: string
                  format: email
                planSuscripcionId:
                  type: string
                  format: uuid
                fechaVencimientoSuscripcion:
                  type: string
                  format: date
                dominioPersonalizado:
                  type: string
                  pattern: '^[a-z0-9-]+$'
                configuracionVisual:
                  type: object
                  additionalProperties: true
                codigoPostal:
                  type: string
                  pattern: '^\d{5}$'
                estado:
                  type: string
                municipio:
                  type: string
                ciudad:
                  type: string
                colonia:
                  type: string
                calleYNumero:
                  type: string
      responses:
        '200':
          description: Clínica actualizada correctamente.
        '404':
          description: CLINICA_NOT_FOUND - La clínica no existe.

  /api/clinicas/{id}/status:
    patch:
      summary: Suspender o Reactivar una clínica (Switch SaaS)
      tags:
        - Clínicas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - activar
              properties:
                activar:
                  type: boolean
                  example: false
                  description: "True para reactivar el servicio, False para suspenderlo por falta de pago o mal uso."
      responses:
        '200':
          description: Estado de la clínica modificado exitosamente.
        '400':
          description: Faltan parámetros en el cuerpo de la petición.
        '404':
          description: CLINICA_NOT_FOUND - La clínica no existe

  # --- DASHBOARD ---
  /api/dashboard/resumen-hoy:
    get:
      summary: Obtener los KPIs y el resumen de la operación del día actual
      tags:
        - Dashboard
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Resumen obtenido correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ResumenHoyEntity'

  /api/dashboard/citas-proximas:
    get:
      summary: Obtener las próximas citas programadas (Timeline)
      tags:
        - Dashboard
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de próximas citas obtenida correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CitaProximaEntity'

  /api/dashboard/alertas-notas:
    get:
      summary: Obtener alertas de citas completadas sin nota clínica
      tags:
        - Dashboard
