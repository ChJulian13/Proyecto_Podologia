openapi: 3.0.0
info:
  title: API ICS Quiropodia
  version: 1.0.0
  description: Documentación oficial de los endpoints de la clínica podológica.
servers:
  - url: http://localhost:3000
    description: Servidor Local

# ==========================================
# 1. COMPONENTES Y ESQUEMAS (Modelos)
# ==========================================
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      
  schemas:
    CitaEntity:
      type: object
      required:
        - id
        - clinicaId
        - paciente
        - podologo
        - fechaProgramada
        - horaProgramada
        - duracionMinutos
        - estado
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        paciente:
          type: object
          required:
            - id
            - nombre
            - primerApellido
            - nombreCompleto
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
        podologo:
          type: object
          required:
            - id
            - nombre
            - primerApellido
            - nombreCompleto
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
        servicio:
          type: object
          nullable: true
          required:
            - id
            - nombre
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        fechaProgramada:
          type: string
          example: "2026-04-01"
        horaProgramada:
          type: string
          example: "14:30"
        duracionMinutos:
          type: integer
        estado:
          type: string
          enum: [PROGRAMADA, CONFIRMADA, COMPLETADA, CANCELADA]
        notas:
          type: string
          nullable: true
        fechaCreacion:
          type: string
          format: date-time
        fechaActualizacion:
          type: string
          format: date-time

    ClinicaEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          example: "ICS Quiropodia Xalapa"
        telefono:
          type: string
          nullable: true
          example: "2288123456"
        correo:
          type: string
          nullable: true
          example: "contacto@icsquiropodia.com"
        estaActiva:
          type: boolean
          description: "Mapeado desde el tinyint de MySQL"
          example: true
        fechaCreacion:
          type: string
          format: date-time

    FacturaEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        pacienteId:
          type: string
          format: uuid
        citaId:
          type: string
          format: uuid
          nullable: true
        numeroFactura:
          type: string
          example: "FAC-2026-001"
        fechaEmision:
          type: string
          format: date-time
        descripcionServicio:
          type: string
          example: "Extracción de uña encarnada"
        monto:
          type: number
          example: 850.00
        estadoPago:
          type: string
          enum: [PENDIENTE, PAGADO]
        metodoPago:
          type: string
          enum: [EFECTIVO, TARJETA, TRANSFERENCIA]
          nullable: true
        fechaPago:
          type: string
          format: date-time
          nullable: true

    ImagenPacienteEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        pacienteId:
          type: string
          format: uuid
        notaClinicaId:
          type: string
          format: uuid
          nullable: true
        urlArchivo:
          type: string
          description: "Ruta o URL donde se encuentra almacenada la imagen físicamente"
          example: "/uploads/imagenes/paciente_abc_123.jpg"
        descripcion:
          type: string
          nullable: true
          example: "Evolución de uña encarnada pie derecho post-tratamiento"
        fechaCreacion:
          type: string
          format: date-time

    NotaClinicaEntity:
      type: object
      required:
        - id
        - clinica
        - paciente
        - podologo
        - fechaNota
        - fechaCreacion
      properties:
        id:
          type: string
          format: uuid
        clinica:
          type: object
          required:
            - id
            - nombre
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        paciente:
          type: object
          required:
            - id
            - nombre
            - primerApellido
            - nombreCompleto
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
        podologo:
          type: object
          required:
            - id
            - nombre
            - primerApellido
            - nombreCompleto
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
        cita:
          type: object
          nullable: true
          required:
            - id
            - fechaProgramada
            - servicioNombre
          properties:
            id:
              type: string
              format: uuid
            fechaProgramada:
              type: string
              format: date
            servicioNombre:
              type: string
              description: Nombre del servicio realizado en esa cita
        fechaNota:
          type: string
          format: date
          example: "2026-04-09"
        notas:
          type: string
          nullable: true
        diagnostico:
          type: string
          nullable: true
        tratamiento:
          type: string
          nullable: true
        fechaCreacion:
          type: string
          format: date-time

    PacienteEntity:
      type: object
      required:
        - id
        - clinica
        - nombre
        - primerApellido
        - nombreCompleto
        - telefono
        - estaActivo
        - fechaCreacion
      properties:
        id:
          type: string
          format: uuid
        clinica:
          type: object
          required:
            - id
            - nombre
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        nombre:
          type: string
        primerApellido:
          type: string
        segundoApellido:
          type: string
          nullable: true
        nombreCompleto:
          type: string
          description: Nombre concatenado listo para visualización en tablas
        telefono:
          type: string
        correo:
          type: string
          format: email
          nullable: true
        fechaNacimiento:
          type: string
          format: date
          nullable: true
        direccion:
          type: string
          nullable: true
        discapacidad:
          type: string
          nullable: true
        alergias:
          type: string
          nullable: true
        notas:
          type: string
          nullable: true
        estaActivo:
          type: boolean
        fechaCreacion:
          type: string
          format: date-time

    ServicioEntity:
      type: object
      required:
        - id
        - clinica
        - nombre
        - duracionMinutos
        - precio
        - estaActivo
        - fechaCreacion
      properties:
        id:
          type: string
          format: uuid
        clinica:
          type: object
          required:
            - id
            - nombre
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        nombre:
          type: string
        descripcion:
          type: string
          nullable: true
        duracionMinutos:
          type: integer
        precio:
          type: number
          format: float
          description: Precio del servicio convertido a número para el Frontend
        estaActivo:
          type: boolean
        fechaCreacion:
          type: string
          format: date-time

    UsuarioEntity:
      type: object
      required:
        - id
        - clinica
        - correo
        - nombre
        - primerApellido
        - nombreCompleto
        - rol
        - estaActivo
        - fechaCreacion
      properties:
        id:
          type: string
          format: uuid
        clinica:
          type: object
          required:
            - id
            - nombre
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        correo:
          type: string
          format: email
        nombre:
          type: string
        primerApellido:
          type: string
        segundoApellido:
          type: string
          nullable: true
        nombreCompleto:
          type: string
          description: Nombre concatenado listo para mostrar en el perfil o tablas
        rol:
          type: string
          enum: [ADMINISTRADOR, PODOLOGO, RECEPCIONISTA]
        estaActivo:
          type: boolean
        fechaCreacion:
          type: string
          format: date-time


# ==========================================
# 2. RUTAS (Endpoints)
# ==========================================
paths:
  # --- AUTENTICACIÓN ---
  /api/auth/login:
    post:
      summary: Iniciar sesión en el sistema
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - correo
                - contrasena
              properties:
                correo:
                  type: string
                  format: email
                  example: "juan.recepcion@icsquiropodia.com"
                contrasena:
                  type: string
                  example: "Segura123!"
      responses:
        '200':
          description: Inicio de sesión exitoso. Se inyecta la cookie HttpOnly de forma transparente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Inicio de sesión exitoso"
                  data:
                    $ref: '#/components/schemas/UsuarioEntity'
        '400':
          description: Error de validación Zod.
        '401':
          description: CREDENCIALES_INVALIDAS - Correo o contraseña incorrectos.
        '500':
          description: Error interno en el inicio de sesión.

  /api/auth/logout:
    post:
      summary: Cerrar sesión
      tags:
        - Autenticación
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Sesión cerrada exitosamente. Se instruye al navegador a destruir la cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Sesión cerrada exitosamente"

  # --- CITAS ---
  /api/citas/clinica/{clinicaId}:
    get:
      summary: Obtener todas las citas de una clínica específica
      tags:
        - Citas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: clinicaId
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la clínica
      responses:
        '200':
          description: Lista de entidades Cita mapeadas para Angular.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CitaEntity'
        '400':
          description: El ID de la clínica es inválido.

  /api/citas:
    post:
      summary: Agendar una nueva cita
      tags:
        - Citas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clinica_id
                - paciente_id
                - podologo_id
                - fecha_programada
                - hora_programada
              properties:
                clinica_id:
                  type: string
                  format: uuid
                paciente_id:
                  type: string
                  format: uuid
                podologo_id:
                  type: string
                  format: uuid
                servicio_id:
                  type: string
                  format: uuid
                  nullable: true
                fecha_programada:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                  example: "2026-04-15"
                hora_programada:
                  type: string
                  pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
                  example: "09:30"
                duracion_minutos:
                  type: integer
                  minimum: 1
                  default: 60
                notas:
                  type: string
      responses:
        '201':
          description: Cita agendada exitosamente.
        '400':
          description: Error de validación Zod.

  /api/citas/{id}:
    patch:
      summary: Actualizar o cambiar estado de una cita
      tags:
        - Citas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fecha_programada:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                hora_programada:
                  type: string
                  pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
                estado:
                  type: string
                  enum: [PROGRAMADA, CONFIRMADA, COMPLETADA, CANCELADA]
                notas:
                  type: string
      responses:
        '200':
          description: Cita actualizada correctamente.
        '404':
          description: CITA_NOT_FOUND - La cita no existe.
    delete:
      summary: Cancelar una cita (Soft Delete)
      description: Cambia el estado de la cita a 'CANCELADA' sin eliminar el registro físico de la base de datos.
      tags:
        - Citas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la cita a cancelar
      responses:
        '200':
          description: Cita cancelada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Cita cancelada exitosamente"
        '401':
          description: No autorizado - Falta o token inválido.
        '404':
          description: CITA_NOT_FOUND - La cita no existe.
        '500':
          description: Error al cancelar la cita.
  # --- CLÍNICAS ---
  /api/clinicas:
    get:
      summary: Obtener todas las clínicas
      tags:
        - Clínicas
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de clínicas obtenida correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClinicaEntity'
        '500':
          description: Error interno del servidor.

    post:
      summary: Crear una nueva clínica
      tags:
        - Clínicas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
              properties:
                nombre:
                  type: string
                  minLength: 3
                  example: "ICS Quiropodia Xalapa Centro"
                telefono:
                  type: string
                  pattern: '^\+?[\d\s\-]{7,20}$'
                  example: "+52 228 123 4567"
                correo:
                  type: string
                  format: email
                  example: "contacto@icsquiropodia.com"
      responses:
        '201':
          description: Clínica creada exitosamente.
        '400':
          description: Error de validación Zod.
        '500':
          description: Error al crear la clínica.

  /api/clinicas/{id}:
    patch:
      summary: Actualizar datos de una clínica
      tags:
        - Clínicas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  minLength: 3
                telefono:
                  type: string
                  pattern: '^\+?[\d\s\-]{7,20}$'
                correo:
                  type: string
                  format: email
      responses:
        '200':
          description: Clínica actualizada correctamente.
        '404':
          description: CLINICA_NOT_FOUND - La clínica no existe.

    delete:
      summary: Desactivar una clínica (Soft Delete)
      tags:
        - Clínicas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Clínica desactivada exitosamente.
        '404':
          description: CLINICA_NOT_FOUND - La clínica no existe.

  # --- DASHBOARD ---
  /api/dashboard/citas-hoy:
    get:
      summary: Obtener citas programadas para el día actual
      tags:
        - Dashboard
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de citas obtenida.
        '401':
          description: No autorizado.

  /api/dashboard/citas-proximas:
    get:
      summary: Obtener citas programadas para fechas futuras
      tags:
        - Dashboard
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de citas futuras obtenida.

  # --- FACTURAS ---
  /api/facturas/cita/{citaId}:
    get:
      summary: Obtener las facturas asociadas a una cita específica
      tags:
        - Facturas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: citaId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de facturas obtenida correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FacturaEntity'
        '400':
          description: El ID de la cita es inválido.

  /api/facturas:
    post:
      summary: Generar una nueva factura
      tags:
        - Facturas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clinica_id
                - paciente_id
                - numero_factura
                - descripcion_servicio
                - monto
              properties:
                clinica_id:
                  type: string
                  format: uuid
                paciente_id:
                  type: string
                  format: uuid
                cita_id:
                  type: string
                  format: uuid
                  nullable: true
                numero_factura:
                  type: string
                  minLength: 1
                  example: "FAC-2026-001"
                descripcion_servicio:
                  type: string
                  minLength: 1
                  example: "Consulta podológica general y corte de uñas"
                monto:
                  type: number
                  minimum: 0
                  example: 500.50
      responses:
        '201':
          description: Factura generada exitosamente.
        '409':
          description: NUMERO_FACTURA_DUPLICADO.

  /api/facturas/{id}/pagar:
    patch:
      summary: Marcar una factura como pagada
      tags:
        - Facturas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - estado_pago
                - metodo_pago
              properties:
                estado_pago:
                  type: string
                  enum: [PAGADO]
                metodo_pago:
                  type: string
                  enum: [EFECTIVO, TARJETA, TRANSFERENCIA]
      responses:
        '200':
          description: Factura marcada como pagada.

  # --- IMÁGENES PACIENTE ---
  /api/imagenes-paciente/paciente/{pacienteId}:
    get:
      summary: Obtener todas las imágenes clínicas de un paciente
      tags:
        - Imágenes Paciente
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: pacienteId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de imágenes obtenida correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImagenPacienteEntity'
  /api/imagenes-paciente/nota-clinica/{notaClinicaId}:
    get:
      summary: Obtener las imágenes asociadas a una nota clínica específica
      tags:
        - Imágenes Paciente
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: notaClinicaId
          required: true
          description: UUID de la nota clínica
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Imágenes de la nota obtenidas correctamente. Retorna un array vacío [] si no hay evidencia.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImagenPacienteEntity'
        '400':
          description: El ID de la nota clínica es inválido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'El ID de la nota clínica es inválido'

  /api/imagenes-paciente:
    post:
      summary: Subir una nueva imagen clínica (Requiere FormData)
      tags:
        - Imágenes Paciente
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - imagen
                - clinica_id
                - paciente_id
              properties:
                imagen:
                  type: string
                  format: binary
                clinica_id:
                  type: string
                  format: uuid
                paciente_id:
                  type: string
                  format: uuid
                nota_clinica_id:
                  type: string
                  format: uuid
                  nullable: true
                descripcion:
                  type: string
      responses:
        '201':
          description: Imagen guardada exitosamente.

  /api/imagenes-paciente/{id}:
    delete:
      summary: Eliminar una imagen del expediente
      tags:
        - Imágenes Paciente
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Imagen eliminada exitosamente.

  # --- NOTAS CLÍNICAS ---
  /api/notas-clinicas/paciente/{pacienteId}:
    get:
      summary: Obtener el historial de notas clínicas de un paciente
      tags:
        - Notas Clínicas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: pacienteId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Historial clínico obtenido correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotaClinicaEntity'

  /api/notas-clinicas:
    post:
      summary: Crear una nueva nota clínica
      tags:
        - Notas Clínicas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clinica_id
                - paciente_id
                - podologo_id
              properties:
                clinica_id:
                  type: string
                  format: uuid
                paciente_id:
                  type: string
                  format: uuid
                podologo_id:
                  type: string
                  format: uuid
                cita_id:
                  type: string
                  format: uuid
                  nullable: true
                fecha_nota:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                notas:
                  type: string
                diagnostico:
                  type: string
                tratamiento:
                  type: string
      responses:
        '201':
          description: Nota clínica guardada exitosamente.
  
  /api/notas-clinicas/cita/{citaId}:
    get:
      summary: Obtener la nota clínica asociada a una cita
      description: Retorna la nota clínica si la cita ya fue atendida. Si retorna 404, significa que es una cita nueva y el formulario debe abrirse en modo Creación.
      tags:
        - Notas Clínicas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: citaId
          required: true
          description: UUID de la cita
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Nota clínica obtenida correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/NotaClinicaEntity'
        '404':
          description: No hay nota clínica para esta cita.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'No hay nota clínica para esta cita'
        '400':
          description: El ID de la cita es inválido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'El ID de la cita es inválido'

  /api/notas-clinicas/{id}:
    patch:
      summary: Actualizar una nota clínica existente
      tags:
        - Notas Clínicas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notas:
                  type: string
                diagnostico:
                  type: string
                tratamiento:
                  type: string
      responses:
        '200':
          description: Nota clínica actualizada.

