      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - planSuscripcionId
              properties:
                nombre:
                  type: string
                  minLength: 3
                  example: "ICS Quiropodia Xalapa Centro"
                telefono:
                  type: string
                  pattern: '^\+?[\d\s\-]{7,20}$'
                  example: "+52 228 123 4567"
                correo:
                  type: string
                  format: email
                  example: "contacto@icsquiropodia.com"
                platformAdminId:
                  type: string
                  format: uuid
                  example: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"
                planSuscripcionId:
                  type: string
                  format: uuid
                  example: "f9e8d7c6-b5a4-3c2d-1e0f-a1b2c3d4e5f6"
                fechaVencimientoSuscripcion:
                  type: string
                  format: date
                  example: "2026-05-20"
                dominioPersonalizado:
                  type: string
                  pattern: '^[a-z0-9-]+$'
                  example: "xalapa-centro"
                configuracionVisual:
                  type: object
                  additionalProperties: true
                  example: { "logo_url": "https://link.com/logo.png", "color_primario": "#FF5733" }
                codigoPostal:
                  type: string
                  pattern: '^\d{5}$'
                  example: "91018"
                estado:
                  type: string
                  example: "Veracruz de Ignacio de la Llave"
                municipio:
                  type: string
                  example: "Xalapa"
                ciudad:
                  type: string
                  example: "Xalapa-Enríquez"
                colonia:
                  type: string
                  example: "Centro"
                calleYNumero:
                  type: string
                  example: "Av. Principal 123"
      responses:
        '201':
          description: Clínica creada exitosamente.
        '400':
          description: Error de validación Zod.
        '500':
          description: Error al crear la clínica.

