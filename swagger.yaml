  /api/ventas-inventario:
    post:
      summary: Registrar Venta Múltiple (Carrito de Compras)
      description: |
        Operación transaccional con algoritmo FEFO (First Expired, First Out).
        Registra múltiples productos y descuenta stock automáticamente de los lotes
        con fecha de caducidad más próxima. Si un lote no alcanza, continúa con el siguiente.
        Genera trazabilidad en la tabla ventas_inventario_lotes.
      tags:
        - Ventas Inventario
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVentaMasivaDTO'
      responses:
        '201':
          description: Ventas registradas exitosamente
        '400':
          description: Stock insuficiente en alguno de los productos

  /api/ventas-inventario/{id}/cancelar:
    patch:
      summary: Cancelar una venta y revertir el stock
      description: |
        Operación transaccional para anular venta y restaurar stock en cada lote
        original utilizando los registros de trazabilidad de ventas_inventario_lotes.
      tags:
        - Ventas Inventario
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Venta cancelada y stock restaurado
        '409':
          description: Conflicto - Esta venta ya fue cancelada

  # ==========================================
  # --- CONSULTAS (Acto Médico) ---
  # ==========================================

  /api/consultas:
    post:
      summary: Crear consulta médica (transaccional)
      description: |
        Crea la consulta y, en la **misma transacción SQL**, inserta todos los
        productos recetados del array `recetas`. Si falla cualquier inserción
        de receta se hace **ROLLBACK** de la consulta completa.
      tags:
        - Consultas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsultaDTO'
            example:
              cita_id: "a1b2c3d4-0000-0000-0000-000000000001"
              paciente_id: "a1b2c3d4-0000-0000-0000-000000000002"
              podologo_id: "a1b2c3d4-0000-0000-0000-000000000003"
              diagnostico: "Onicomicosis leve"
              procedimiento_detallado: "Limado y aplicación tópica"
              indicaciones_cuidado: "Pie seco, medias de algodón"
              fecha_proxima_consulta: "2026-06-15"
              monto_procedimiento: 450.00
              requiere_consentimiento: false
              consentimiento_firmado: false
              recetas:
                - producto_id: "b2c3d4e5-0000-0000-0000-000000000010"
                  cantidad: 1
                  precio_unitario_venta: 185.00
                  indicaciones_uso: "Aplicar 2 veces al día"
      responses:
        '201':
          description: Consulta creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Consulta creada exitosamente"
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
        '400':
          description: Error de validación (Zod)
        '401':
          description: No autenticado

  /api/consultas/{id}:
    get:
      summary: Obtener detalle completo de una consulta
      description: Devuelve la consulta junto con el arreglo anidado de todas sus `recetas`.
      tags:
        - Consultas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: UUID de la consulta
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Consulta obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ConsultaEntity'
        '404':
          description: Consulta no encontrada
    patch:
      summary: Actualizar parcialmente una consulta
      description: |
        Permite editar los campos clínicos de una consulta existente.
        **Restricción:** No puede modificar `cita_id`, `paciente_id` ni `podologo_id`.
      tags:
        - Consultas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: UUID de la consulta
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConsultaDTO'
      responses:
        '200':
          description: Consulta actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Consulta actualizada exitosamente"
                  data:
                    $ref: '#/components/schemas/ConsultaEntity'
        '400':
          description: Error de validación (Zod)
        '404':
          description: Consulta no encontrada

  /api/consultas/paciente/{pacienteId}:
    get:
      summary: Historial clínico de un paciente
      description: |
        Devuelve todas las consultas del paciente, ordenadas por `fecha_registro`
        de forma **descendente** (las más recientes primero). Cada consulta incluye
        su arreglo de `recetas`.
      tags:
        - Consultas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: pacienteId
          required: true
          description: UUID del paciente
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Historial clínico obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConsultaEntity'
        '401':
          description: No autenticado

  /api/consultas/cita/{citaId}:
    get:
      summary: Verificar si una cita ya tiene consulta registrada
      description: |
        Busca si la cita especificada ya tiene una consulta completada asociada.
        Permite al frontend decidir si puede iniciar una nueva atención o si debe
        mostrar el registro existente.
      tags:
        - Consultas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: citaId
          required: true
          description: UUID de la cita
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: La cita ya tiene una consulta registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ConsultaEntity'
        '404':
          description: No existe consulta para esta cita (puede iniciar una nueva atención)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "No existe una consulta registrada para esta cita"
                  data:
                    nullable: true
                    example: null

  /api/consultas/{consultaId}/recetas:
    post:
      summary: Agregar un producto a la receta de una consulta existente
      description: Agrega un nuevo producto recetado a una consulta ya guardada.
      tags:
        - Consultas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: consultaId
          required: true
          description: UUID de la consulta
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsultaRecetaDTO'
      responses:
        '201':
          description: Producto agregado a la receta exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Producto agregado a la receta exitosamente"
                  data:
                    $ref: '#/components/schemas/ConsultaRecetaEntity'
        '400':
          description: Error de validación (Zod)
        '404':
          description: Consulta no encontrada

  /api/consultas/{consultaId}/recetas/{recetaId}:
    delete:
      summary: Eliminar un producto de la receta de una consulta
      description: Elimina una línea de receta específica. Responde con **204 No Content** si tuvo éxito.
      tags:
        - Consultas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: consultaId
          required: true
          description: UUID de la consulta
          schema:
            type: string
            format: uuid
        - in: path
          name: recetaId
          required: true
          description: UUID de la receta (línea de producto)
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Producto eliminado de la receta exitosamente (sin contenido)
        '404':
          description: Consulta o receta no encontrada