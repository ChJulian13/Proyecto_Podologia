openapi: 3.0.0
info:
  title: API ICS Quiropodia
  version: 1.0.0
  description: Documentación oficial de los endpoints de la clínica podológica.
servers:
  - url: http://localhost:3000
    description: Servidor Local

# ==========================================
# 1. COMPONENTES Y ESQUEMAS (Modelos)
# ==========================================
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      
  schemas:
    # --- CATEGORÍAS INVENTARIO ---
    CategoriaInventarioEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          example: "Consumible Médico"
        descripcion:
          type: string
          nullable: true
        estaActivo:
          type: boolean
        fechaCreacion:
          type: string
          format: date-time

    CreateCategoriaInventarioDTO:
      type: object
      required:
        - nombre
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 50
          example: "Insumos"
        descripcion:
          type: string
          maxLength: 255
          nullable: true

    UpdateCategoriaInventarioDTO:
      type: object
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 50
        descripcion:
          type: string
          maxLength: 255
          nullable: true
    PacienteRapidoDTO:
      type: object
      required:
        - nombre
        - primer_apellido
        - telefono
      properties:
        nombre:
          type: string
        primer_apellido:
          type: string
        telefono:
          type: string

    CreateCitaRapidaDTO:
      type: object
      required:
        - clinica_id
        - podologo_id
        - fecha_programada
        - hora_programada
        - paciente_nuevo
      properties:
        clinica_id:
          type: string
          format: uuid
        podologo_id:
          type: string
          format: uuid
        servicio_id:
          type: string
          format: uuid
          nullable: true
        fecha_programada:
          type: string
          format: date
        hora_programada:
          type: string
          example: "16:30"
        duracion_minutos:
          type: integer
          default: 60
        notas:
          type: string
          nullable: true
        paciente_nuevo:
          $ref: '#/components/schemas/PacienteRapidoDTO'

    # --- INVENTARIO ---
    InventarioEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        categoria:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        nombre:
          type: string
          example: "Crema de Urea 40%"
        descripcion:
          type: string
          nullable: true
        stockCantidad:
          type: integer
          example: 50
        precioCompra:
          type: number
          format: float
          nullable: true
          example: 120.50
        precioVenta:
          type: number
          format: float
          nullable: true
          example: 250.00
        fechaCaducidad:
          type: string
          format: date
          nullable: true
        ubicacion:
          type: string
          nullable: true
          example: "Vitrina 1"
        estaActivo:
          type: boolean
        fechaCreacion:
          type: string
          format: date-time
        fechaActualizacion:
          type: string
          format: date-time

    CreateInventarioDTO:
      type: object
      required:
        - clinica_id
        - categoria_id
        - nombre
      properties:
        clinica_id:
          type: string
          format: uuid
        categoria_id:
          type: string
          format: uuid
        nombre:
          type: string
          minLength: 2
        descripcion:
          type: string
          nullable: true
        stock_cantidad:
          type: integer
          minimum: 0
          default: 0
        precio_compra:
          type: number
          format: float
          minimum: 0
          nullable: true
        precio_venta:
          type: number
          format: float
          minimum: 0
          nullable: true
        fecha_caducidad:
          type: string
          format: date
          nullable: true
        ubicacion:
          type: string
          maxLength: 255
          nullable: true

    UpdateInventarioDTO:
      type: object
      properties:
        categoria_id:
          type: string
          format: uuid
        nombre:
          type: string
          minLength: 2
        descripcion:
          type: string
          nullable: true
        precio_compra:
          type: number
          format: float
          minimum: 0
          nullable: true
        precio_venta:
          type: number
          format: float
          minimum: 0
          nullable: true
        fecha_caducidad:
          type: string
          format: date
          nullable: true
        ubicacion:
          type: string
          maxLength: 255
          nullable: true

    AjusteStockDTO:
      type: object
      required:
        - cantidad
        - tipo
      properties:
        cantidad:
          type: integer
          minimum: 1
        tipo:
          type: string
          enum: [ENTRADA, SALIDA]
        motivo:
          type: string
          nullable: true

    # --- VENTAS INVENTARIO ---
    VentaInventarioEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        pacienteId:
          type: string
          format: uuid
          nullable: true
        facturaId:
          type: string
          format: uuid
          nullable: true
        inventarioItem:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        cantidad:
          type: integer
        precioVenta:
          type: number
          format: float
        fechaVenta:
          type: string
          format: date-time
        estaCancelada:
          type: boolean

    ItemVentaDTO:
      type: object
      required:
        - inventario_item_id
        - cantidad
        - precio_venta
      properties:
        inventario_item_id:
          type: string
          format: uuid
        cantidad:
          type: integer
          minimum: 1
        precio_venta:
          type: number
          format: float
          minimum: 0

    CreateVentaMasivaDTO:
      type: object
      required:
        - clinica_id
        - productos
      properties:
        clinica_id:
          type: string
          format: uuid
        paciente_id:
          type: string
          format: uuid
          nullable: true
        factura_id:
          type: string
          format: uuid
          nullable: true
        productos:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ItemVentaDTO'
    AnamnesisEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        pacienteId:
          type: string
          format: uuid
        paciente:
          type: object
          properties:
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
            telefono:
              type: string
            correo:
              type: string
              nullable: true
            fechaNacimiento:
              type: string
              format: date
              nullable: true
            discapacidad:
              type: string
              nullable: true
            alergias:
              type: string
              nullable: true
            notas:
              type: string
              nullable: true
            direccion:
              type: object
              properties:
                codigoPostal:
                  type: string
                  nullable: true
                estado:
                  type: string
                  nullable: true
                municipio:
                  type: string
                  nullable: true
                ciudad:
                  type: string
                  nullable: true
                colonia:
                  type: string
                  nullable: true
                calleYNumero:
                  type: string
                  nullable: true
        podologoVerificadorId:
          type: string
          format: uuid
          nullable: true
        fechaVerificacion:
          type: string
          format: date-time
          nullable: true
        profesion:
          type: string
          nullable: true
        contactoEmergenciaNombre:
          type: string
          nullable: true
        contactoEmergenciaTelefono:
          type: string
          nullable: true
        comoNosEncontro:
          type: string
          enum: [EVENTO, INSTAGRAM, INTERNET, RECOMENDACION, OTRO]
          nullable: true
        tomaMedicamentos:
          type: boolean
        listaMedicamentos:
          type: string
          nullable: true
        estaEmbarazada:
          type: boolean
        semanaEmbarazo:
          type: integer
          nullable: true
        embarazoAltoRiesgo:
          type: boolean
        embarazoDetalles:
          type: string
          nullable: true
        tuvoCirugiasLesiones:
          type: boolean
        listaCirugiasLesiones:
          type: string
          nullable: true
        haRecibidoReflexologia:
          type: boolean
        motivoConsulta:
          type: string
          nullable: true
        objetivosSesion:
          type: string
          nullable: true
        condicionCancer:
          type: boolean
        condicionDolorCabeza:
          type: boolean
        condicionArtritis:
          type: boolean
        condicionDiabetes:
          type: boolean
        condicionPresionAlterada:
          type: boolean
        condicionNeuropatia:
          type: boolean
        condicionFibromialgia:
          type: boolean
        condicionInfarto:
          type: boolean
        condicionEnfermedadRenal:
          type: boolean
        condicionTrombosis:
          type: boolean
        condicionEntumecimiento:
          type: boolean
        condicionEsguinces:
          type: boolean
        condicionExplicacion:
          type: string
          nullable: true
        mapaCorporalUrl:
          type: string
          nullable: true
        escalaSueno:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escalaEnergia:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escalaEstres:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escalaNutricion:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escalaEjercicio:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        aceptaTerminos:
          type: boolean
        lugarFirma:
          type: string
          nullable: true
        fechaCreacion:
          type: string
          format: date-time
        fechaActualizacion:
          type: string
          format: date-time

    CreateAnamnesisDTO:
      type: object
      required:
        - clinica_id
        - paciente_id
      properties:
        clinica_id:
          type: string
          format: uuid
        paciente_id:
          type: string
          format: uuid
        correo:
          type: string
          format: email
          nullable: true
        fecha_nacimiento:
          type: string
          format: date
          nullable: true
        codigoPostal:
          type: string
          pattern: '^\d{5}$'
          nullable: true
        estado:
          type: string
          nullable: true
        municipio:
          type: string
          nullable: true
        ciudad:
          type: string
          nullable: true
        colonia:
          type: string
          nullable: true
        calleYNumero:
          type: string
          nullable: true
        profesion:
          type: string
          maxLength: 150
          nullable: true
        contacto_emergencia_nombre:
          type: string
          maxLength: 150
          nullable: true
        contacto_emergencia_telefono:
          type: string
          maxLength: 20
          nullable: true
        como_nos_encontro:
          type: string
          enum: [EVENTO, INSTAGRAM, INTERNET, RECOMENDACION, OTRO]
          nullable: true
        toma_medicamentos:
          type: boolean
          default: false
        lista_medicamentos:
          type: string
          nullable: true
        esta_embarazada:
          type: boolean
          default: false
        semana_embarazo:
          type: integer
          minimum: 1
          maximum: 42
          nullable: true
        embarazo_alto_riesgo:
          type: boolean
          default: false
        embarazo_detalles:
          type: string
          nullable: true
        tuvo_cirugias_lesiones:
          type: boolean
          default: false
        lista_cirugias_lesiones:
          type: string
          nullable: true
        ha_recibido_reflexologia:
          type: boolean
          default: false
        motivo_consulta:
          type: string
          nullable: true
        objetivos_sesion:
          type: string
          nullable: true
        condicion_cancer:
          type: boolean
          default: false
        condicion_dolor_cabeza:
          type: boolean
          default: false
        condicion_artritis:
          type: boolean
          default: false
        condicion_diabetes:
          type: boolean
          default: false
        condicion_presion_alterada:
          type: boolean
          default: false
        condicion_neuropatia:
          type: boolean
          default: false
        condicion_fibromialgia:
          type: boolean
          default: false
        condicion_infarto:
          type: boolean
          default: false
        condicion_enfermedad_renal:
          type: boolean
          default: false
        condicion_trombosis:
          type: boolean
          default: false
        condicion_entumecimiento:
          type: boolean
          default: false
        condicion_esguinces:
          type: boolean
          default: false
        condicion_explicacion:
          type: string
          nullable: true
        mapa_corporal_url:
          type: string
          maxLength: 255
          nullable: true
        escala_sueno:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_energia:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_estres:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_nutricion:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_ejercicio:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        acepta_terminos:
          type: boolean
          default: false
        lugar_firma:
          type: string
          maxLength: 150
          nullable: true

    UpdateAnamnesisDTO:
      type: object
      description: Copia parcial de CreateAnamnesisDTO, omitiendo clinica_id y paciente_id.
      properties:
        correo:
          type: string
          format: email
          nullable: true
        fecha_nacimiento:
          type: string
          format: date
          nullable: true
        codigoPostal:
          type: string
          pattern: '^\d{5}$'
          nullable: true
        estado:
          type: string
          nullable: true
        municipio:
          type: string
          nullable: true
        ciudad:
          type: string
          nullable: true
        colonia:
          type: string
          nullable: true
        calleYNumero:
          type: string
          nullable: true
        profesion:
          type: string
          maxLength: 150
          nullable: true
        contacto_emergencia_nombre:
          type: string
          maxLength: 150
          nullable: true
        contacto_emergencia_telefono:
          type: string
          maxLength: 20
          nullable: true
        como_nos_encontro:
          type: string
          enum: [EVENTO, INSTAGRAM, INTERNET, RECOMENDACION, OTRO]
          nullable: true
        toma_medicamentos:
          type: boolean
        lista_medicamentos:
          type: string
          nullable: true
        esta_embarazada:
          type: boolean
        semana_embarazo:
          type: integer
          minimum: 1
          maximum: 42
          nullable: true
        embarazo_alto_riesgo:
          type: boolean
        embarazo_detalles:
          type: string
          nullable: true
        tuvo_cirugias_lesiones:
          type: boolean
        lista_cirugias_lesiones:
          type: string
          nullable: true
        ha_recibido_reflexologia:
          type: boolean
        motivo_consulta:
          type: string
          nullable: true
        objetivos_sesion:
          type: string
          nullable: true
        condicion_cancer:
          type: boolean
        condicion_dolor_cabeza:
          type: boolean
        condicion_artritis:
          type: boolean
        condicion_diabetes:
          type: boolean
        condicion_presion_alterada:
          type: boolean
        condicion_neuropatia:
          type: boolean
        condicion_fibromialgia:
          type: boolean
        condicion_infarto:
          type: boolean
        condicion_enfermedad_renal:
          type: boolean
        condicion_trombosis:
          type: boolean
        condicion_entumecimiento:
          type: boolean
        condicion_esguinces:
          type: boolean
        condicion_explicacion:
          type: string
          nullable: true
        mapa_corporal_url:
          type: string
          maxLength: 255
          nullable: true
        escala_sueno:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_energia:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_estres:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_nutricion:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        escala_ejercicio:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        acepta_terminos:
          type: boolean
        lugar_firma:
          type: string
          maxLength: 150
          nullable: true

    CitaEntity:
      type: object
      required:
        - id
        - clinicaId
        - paciente
        - podologo
        - fechaProgramada
        - horaProgramada
        - duracionMinutos
        - estado
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        paciente:
          type: object
          required:
            - id
            - nombre
            - primerApellido
            - nombreCompleto
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
        podologo:
          type: object
          required:
            - id
            - nombre
            - primerApellido
            - nombreCompleto
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
        servicio:
          type: object
          nullable: true
          required:
            - id
            - nombre
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        fechaProgramada:
          type: string
          example: "2026-04-01"
        horaProgramada:
          type: string
          example: "14:30"
        duracionMinutos:
          type: integer
        estado:
          type: string
          enum: [PROGRAMADA, CONFIRMADA, COMPLETADA, CANCELADA]
        notas:
          type: string
          nullable: true
        fechaCreacion:
          type: string
          format: date-time
        fechaActualizacion:
          type: string
          format: date-time

    ClinicaEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          example: "ICS Quiropodia Xalapa"
        telefono:
          type: string
          nullable: true
          example: "2288123456"
        correo:
          type: string
          nullable: true
          example: "contacto@icsquiropodia.com"
        estaActiva:
          type: boolean
          description: "Mapeado desde el tinyint de MySQL. Indica si el sistema está bloqueado para esta clínica."
          example: true
        fechaCreacion:
          type: string
          format: date-time
        platformAdminId:
          type: string
          format: uuid
          nullable: true
        planSuscripcionId:
          type: string
          format: uuid
          nullable: true
        fechaVencimientoSuscripcion:
          type: string
          format: date
          nullable: true
          example: "2026-05-20"
        dominioPersonalizado:
          type: string
          nullable: true
          example: "xalapa-centro"
        configuracionVisual:
          type: object
          additionalProperties: true
          nullable: true
          example: { "logo_url": "https://link.com/logo.png", "color_primario": "#FF5733" }
        codigoPostal:
          type: string
          nullable: true
          example: "91018"
        estado:
          type: string
          nullable: true
          example: "Veracruz de Ignacio de la Llave"
        municipio:
          type: string
          nullable: true
          example: "Xalapa"
        ciudad:
          type: string
          nullable: true
          example: "Xalapa-Enríquez"
        colonia:
          type: string
          nullable: true
          example: "Centro"
        calleYNumero:
          type: string
          nullable: true
          example: "Av. Principal 123"

    FacturaEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        pacienteId:
          type: string
          format: uuid
        citaId:
          type: string
          format: uuid
          nullable: true
        numeroFactura:
          type: string
          example: "FAC-2026-001"
        fechaEmision:
          type: string
          format: date-time
        descripcionServicio:
          type: string
          example: "Extracción de uña encarnada"
        monto:
          type: number
          example: 850.00
        estadoPago:
          type: string
          enum: [PENDIENTE, PAGADO]
        metodoPago:
          type: string
          enum: [EFECTIVO, TARJETA, TRANSFERENCIA]
          nullable: true
        fechaPago:
          type: string
          format: date-time
          nullable: true

    ImagenPacienteEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clinicaId:
          type: string
          format: uuid
        pacienteId:
          type: string
          format: uuid
        notaClinicaId:
          type: string
          format: uuid
          nullable: true
        urlArchivo:
          type: string
          description: "Ruta o URL donde se encuentra almacenada la imagen físicamente"
          example: "/uploads/imagenes/paciente_abc_123.jpg"
        descripcion:
          type: string
          nullable: true
          example: "Evolución de uña encarnada pie derecho post-tratamiento"
        fechaCreacion:
          type: string
          format: date-time

    NotaClinicaEntity:
      type: object
      required:
        - id
        - clinica
        - paciente
        - podologo
        - fechaNota
        - fechaCreacion
      properties:
        id:
          type: string
          format: uuid
        clinica:
          type: object
          required:
            - id
            - nombre
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        paciente:
          type: object
          required:
            - id
            - nombre
            - primerApellido
            - nombreCompleto
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
        podologo:
          type: object
          required:
            - id
            - nombre
            - primerApellido
            - nombreCompleto
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            primerApellido:
              type: string
            segundoApellido:
              type: string
              nullable: true
            nombreCompleto:
              type: string
        cita:
          type: object
          nullable: true
          required:
            - id
            - fechaProgramada
            - servicioNombre
          properties:
            id:
              type: string
              format: uuid
            fechaProgramada:
