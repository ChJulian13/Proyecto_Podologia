        discapacidad:
          type: string
          nullable: true
        alergias:
          type: string
          nullable: true
        notas:
          type: string
          nullable: true
        estaActivo:
          type: boolean
        fechaCreacion:
          type: string
          format: date-time

    ServicioEntity:
      type: object
      required:
        - id
        - clinica
        - nombre
        - duracionMinutos
        - precio
        - estaActivo
        - fechaCreacion
      properties:
        id:
          type: string
          format: uuid
        clinica:
          type: object
          required:
            - id
            - nombre
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
        nombre:
          type: string
        descripcion:
          type: string
          nullable: true
        duracionMinutos:
          type: integer
        precio:
          type: number
          format: float
          description: Precio del servicio convertido a número para el Frontend
        estaActivo:
          type: boolean
        fechaCreacion:
          type: string
          format: date-time

    UsuarioEntity:
      type: object
