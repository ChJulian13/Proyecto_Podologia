        telefono:
          type: string
        correo:
          type: string
          format: email
          nullable: true
        fechaNacimiento:
          type: string
          format: date
          nullable: true
        codigoPostal:
          type: string
          nullable: true
          example: "91018"
        estado:
          type: string
          nullable: true
          example: "Veracruz de Ignacio de la Llave"
        municipio:
          type: string
          nullable: true
          example: "Xalapa"
        ciudad:
          type: string
          nullable: true
          example: "Xalapa-Enríquez"
        colonia:
          type: string
          nullable: true
          example: "Centro"
        calleYNumero:
          type: string
          nullable: true
