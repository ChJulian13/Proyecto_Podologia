# ==========================================
# 2. RUTAS (Endpoints)
# ==========================================
paths:
  # --- ANAMNESIS ---
  /api/anamnesis/paciente/{pacienteId}:
    get:
      summary: Obtiene la anamnesis y los datos combinados de un paciente
      description: Retorna el historial médico completo (AnamnesisEntity) fusionado con los datos demográficos del paciente.
      tags:
        - Anamnesis
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: pacienteId
          required: true
          description: UUID del paciente
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Anamnesis obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/AnamnesisEntity'
        '404':
          description: Paciente o Anamnesis no encontrada

  /api/anamnesis:
    post:
      summary: Crea una nueva anamnesis (Paso 2 del registro)
      description: Endpoint híbrido transaccional. Actualiza la tabla pacientes e inserta el historial clínico en la tabla anamnesis_paciente.
      tags:
        - Anamnesis
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnamnesisDTO'
      responses:
        '201':
          description: Anamnesis registrada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Anamnesis registrada exitosamente"
                  data:
                    $ref: '#/components/schemas/AnamnesisEntity'
        '400':
          description: Error de validación (Zod)
        '409':
          description: El paciente ya tiene una anamnesis registrada

  /api/anamnesis/{id}:
    patch:
      summary: Actualiza parcialmente la anamnesis o los datos del paciente
      description: Recibe un payload parcial para actualizar dinámicamente cualquier campo médico o demográfico mediante una transacción SQL.
      tags:
        - Anamnesis
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: UUID de la anamnesis (No del paciente)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAnamnesisDTO'
      responses:
        '200':
          description: Anamnesis actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Anamnesis actualizada"
                  data:
                    $ref: '#/components/schemas/AnamnesisEntity'
        '404':
          description: Anamnesis no encontrada

  # --- AUTENTICACIÓN ---
  /api/auth/login:
    post:
      summary: Iniciar sesión en el sistema
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - correo
                - contrasena
              properties:
                correo:
                  type: string
                  format: email
                  example: "juan.recepcion@icsquiropodia.com"
                contrasena:
                  type: string
                  example: "Segura123!"
      responses:
        '200':
          description: Inicio de sesión exitoso. Se inyecta la cookie HttpOnly de forma transparente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Inicio de sesión exitoso"
                  data:
                    $ref: '#/components/schemas/UsuarioEntity'
        '400':
          description: Error de validación Zod.
        '401':
          description: CREDENCIALES_INVALIDAS - Correo o contraseña incorrectos.
        '500':
          description: Error interno en el inicio de sesión.

  /api/auth/logout:
    post:
      summary: Cerrar sesión
      tags:
        - Autenticación
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Sesión cerrada exitosamente. Se instruye al navegador a destruir la cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Sesión cerrada exitosamente"

  # --- CITAS ---
  /api/citas/clinica/{clinicaId}:
    get:
      summary: Obtener todas las citas de una clínica específica
      tags:
        - Citas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: clinicaId
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la clínica
      responses:
        '200':
          description: Lista de entidades Cita mapeadas para Angular.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CitaEntity'
        '400':
          description: El ID de la clínica es inválido.

  /api/citas:
    post:
      summary: Agendar una nueva cita
      tags:
        - Citas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clinica_id
                - paciente_id
                - podologo_id
                - fecha_programada
                - hora_programada
              properties:
                clinica_id:
                  type: string
                  format: uuid
                paciente_id:
                  type: string
                  format: uuid
                podologo_id:
                  type: string
                  format: uuid
                servicio_id:
                  type: string
                  format: uuid
                  nullable: true
                fecha_programada:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                  example: "2026-04-15"
                hora_programada:
                  type: string
                  pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
                  example: "09:30"
                duracion_minutos:
                  type: integer
                  minimum: 1
                  default: 60
                notas:
                  type: string
      responses:
        '201':
          description: Cita agendada exitosamente.
        '400':
          description: Error de validación Zod.
  
  /api/citas/rapida:
    post:
      summary: Agendar Cita Rápida y Registro de Paciente
      description: Orquestación atómica para crear un paciente nuevo y su primera cita en una sola transacción.
      tags:
        - Citas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCitaRapidaDTO'
      responses:
        '201':
          description: Registro exitoso de paciente y cita.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Paciente registrado y cita agendada exitosamente"
                  data:
                    type: object
                    properties:
                      pacienteId:
                        type: string
                        format: uuid
                      citaId:
                        type: string
                        format: uuid
        '404':
          description: Clínica, podólogo o servicio no encontrados.
        '400':
          description: Error de validación en los datos o conflicto de pertenencia a clínica.
        '404':
          description: Clínica, podólogo o servicio no encontrados.
        '409':
          description: >
            Conflicto de horario. El bloque de tiempo solicitado se empalma con una 
            cita existente para este podólogo (evaluación de intervalos).

  /api/citas/hoy:
    get:
      summary: Obtener las citas programadas para el día de hoy
      description: |
        Retorna las citas correspondientes al día actual. 
        El comportamiento es "inteligente" y dinámico según el rol del usuario autenticado en el token:
        - Si el usuario es **PODOLOGO**: Retorna únicamente las citas asignadas a él en su clínica.
        - Si el usuario es **RECEPCIONISTA** o **SUPER_ADMIN**: Retorna todas las citas de la clínica.
      tags:
        - Citas
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Citas del día obtenidas correctamente o lista vacía si no hay citas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Citas del día obtenidas"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CitaEntity'
        '403':
          description: Acceso denegado o clínica no identificada en el token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Acceso denegado o clínica no identificada"
        '500':
          description: Error interno al obtener las citas del día.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Error interno al obtener las citas del día"

  /api/citas/{id}:
    patch:
      summary: Actualizar o cambiar estado de una cita
      tags:
        - Citas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fecha_programada:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                hora_programada:
                  type: string
                  pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
                estado:
                  type: string
                  enum: [PROGRAMADA, CONFIRMADA, COMPLETADA, CANCELADA]
                notas:
                  type: string
      responses:
        '200':
          description: Cita actualizada correctamente.
        '404':
          description: CITA_NOT_FOUND - La cita no existe.
    delete:
      summary: Cancelar una cita (Soft Delete)
      description: Cambia el estado de la cita a 'CANCELADA' sin eliminar el registro físico de la base de datos.
      tags:
        - Citas
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la cita a cancelar
      responses:
        '200':
          description: Cita cancelada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Cita cancelada exitosamente"
        '401':
          description: No autorizado - Falta o token inválido.
        '404':
          description: CITA_NOT_FOUND - La cita no existe.
        '500':
          description: Error al cancelar la cita.
